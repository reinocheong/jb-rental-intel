<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>JB Rentals — 新山房源</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: #020617;
      min-height: 100vh;
      color: #e2e8f0;
      padding: 0.75rem;
      width: 100%;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header { margin-bottom: 1rem; }
    .header-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.3rem; }
    .pulse-dot { width: 8px; height: 8px; flex-shrink: 0; background: #22d3ee; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    h1 { font-size: 1.05rem; font-weight: 700; line-height: 1.3; }
    .stats { color: #64748b; font-size: 0.7rem; margin-top: 0.2rem; }
    .stats span { color: #22d3ee; font-weight: 600; }

    /* ── Search ── */
    .search-bar {
      width: 100%; padding: 0.7rem 0.85rem;
      background: #0f172a; border: 1px solid #1e293b; border-radius: 0.6rem;
      color: #e2e8f0; font-size: 0.85rem; font-family: inherit;
      outline: none; transition: border-color 0.2s;
      margin-bottom: 0.6rem;
    }
    .search-bar:focus { border-color: #22d3ee; }
    .search-bar::placeholder { color: #475569; }

    /* ── Filter Chips ── */
    .filter-section { margin-bottom: 0.5rem; }
    .filter-label { font-size: 0.65rem; color: #64748b; margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .chip-row { display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .chip {
      padding: 0.3rem 0.6rem; border-radius: 1rem;
      font-size: 0.7rem; font-weight: 500;
      background: #0f172a; border: 1px solid #1e293b;
      color: #94a3b8; cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
      user-select: none;
    }
    .chip:hover { border-color: #334155; color: #cbd5e1; }
    .chip.active { background: #22d3ee; border-color: #22d3ee; color: #020617; font-weight: 600; }

    /* ── Results Header ── */
    .results-info {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.5rem 0; margin-bottom: 0.5rem;
      border-bottom: 1px solid #1e293b;
      font-size: 0.72rem; color: #64748b;
    }

    /* ── Cards ── */
    .card {
      background: #0f172a; border: 1px solid #1e293b;
      border-radius: 0.75rem; padding: 0.85rem;
      margin-bottom: 0.6rem; transition: border-color 0.15s;
      width: 100%;
    }
    .card:hover { border-color: #334155; }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; margin-bottom: 0.5rem; }
    .card-title {
      font-size: 0.9rem; font-weight: 600; color: #f1f5f9;
      line-height: 1.35; flex: 1; word-break: break-word;
    }
    .card-badge {
      flex-shrink: 0; padding: 0.15rem 0.45rem; border-radius: 0.3rem;
      font-size: 0.62rem; font-weight: 600; letter-spacing: 0.03em;
    }
    .badge-rent { background: rgba(34,211,238,0.15); color: #22d3ee; }
    .badge-sale { background: rgba(250,204,21,0.15); color: #facc15; }

    .card-meta {
      display: flex; flex-wrap: wrap; gap: 0.35rem 0.6rem;
      margin-bottom: 0.55rem; font-size: 0.72rem;
    }
    .meta-chip {
      padding: 0.2rem 0.45rem; border-radius: 0.3rem;
      background: rgba(30,41,59,0.6); color: #94a3b8;
      white-space: nowrap;
    }
    .meta-rent { color: #22d3ee; font-weight: 600; }

    .card-phone {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.35rem 0.6rem; border-radius: 0.4rem;
      background: rgba(34,211,238,0.08); border: 1px solid rgba(34,211,238,0.2);
      color: #22d3ee; font-size: 0.78rem; font-weight: 600;
      margin-bottom: 0.55rem; text-decoration: none;
      letter-spacing: 0.02em;
    }
    .card-phone:hover { background: rgba(34,211,238,0.15); }

    .card-post {
      font-size: 0.72rem; color: #94a3b8; line-height: 1.5;
      padding: 0.55rem 0.6rem; border-radius: 0.4rem;
      background: rgba(30,41,59,0.4); margin-bottom: 0.5rem;
      cursor: pointer; transition: background 0.15s;
      word-break: break-word;
    }
    .card-post:hover { background: rgba(30,41,59,0.7); }
    .card-post.expanded { max-height: none; }
    .post-toggle {
      color: #22d3ee; font-size: 0.65rem; margin-left: 0.3rem;
      font-weight: 500; white-space: nowrap;
    }

    .card-footer {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.62rem; color: #475569;
    }
    .card-link {
      color: #22d3ee; text-decoration: none; font-size: 0.65rem;
      font-weight: 500;
    }
    .card-link:hover { text-decoration: underline; }
    .card-agent { color: #64748b; }

    /* ── Empty State ── */
    .empty {
      text-align: center; padding: 2rem 1rem; color: #475569;
      font-size: 0.8rem;
    }

    /* ── Footer ── */
    .footer {
      text-align: center; padding: 1rem 0; color: #334155;
      font-size: 0.62rem; border-top: 1px solid #1e293b; margin-top: 0.5rem;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-row">
      <div class="pulse-dot"></div>
      <h1>Smart Tenancy Pro<br>新山房源</h1>
    </div>
    <div class="stats">共 <span id="total-count">—</span> 条房源 · 更新于 <span id="update-time">加载中…</span></div>
  </div>

  <!-- Search -->
  <input class="search-bar" id="search" type="text" placeholder="搜索房源名称、中介、备注…" oninput="render()">

  <!-- Listing Type Filter -->
  <div class="filter-section">
    <div class="filter-label">类型</div>
    <div class="chip-row" id="filter-listing-type"></div>
  </div>

  <!-- Property Type Filter -->
  <div class="filter-section">
    <div class="filter-label">房型</div>
    <div class="chip-row" id="filter-property-type"></div>
  </div>

  <!-- Results -->
  <div class="results-info">
    <span id="showing">显示 — 条</span>
  </div>
  <div id="card-container"></div>
  <div class="empty" id="empty-msg" style="display:none">没有匹配的房源</div>

  <div class="footer">Data from JB Rentals Sheet · Smart Tenancy Pro</div>

<script>
  let ALL = [];
  let activeListingType = null;
  let activePropertyType = null;

  const TOP_PROPERTY_TYPES = ['公寓','排屋','双层排屋','单层排屋','房间','Studio','Flat','中房','大房','小房'];

  // ── Load JSON ──
  (async () => {
    try {
      const r = await fetch('data/rentals.json');
      const d = await r.json();
      ALL = d.listings;
      document.getElementById('update-time').textContent = d.updated;
      document.getElementById('total-count').textContent = d.total;
      buildChips();
      render();
    } catch(e) {
      document.getElementById('card-container').innerHTML = '<div class="empty">⚠️ 数据加载失败，请稍后再试</div>';
      document.getElementById('update-time').textContent = '错误';
    }
  })();

  // ── Filter Chips ──
  function buildChips() {
    // Listing Type chips
    const lt = document.getElementById('filter-listing-type');
    const types = ['全部','出租','出售'];
    types.forEach(t => {
      const c = document.createElement('span');
      c.className = 'chip' + (t === '全部' ? ' active' : '');
      c.textContent = t;
      c.onclick = () => {
        lt.querySelectorAll('.chip').forEach(ch => ch.classList.remove('active'));
        c.classList.add('active');
        activeListingType = t === '全部' ? null : t;
        render();
      };
      lt.appendChild(c);
    });

    // Property Type chips — only count top types
    const pt = document.getElementById('filter-property-type');
    const counts = {};
    ALL.forEach(l => {
      const v = l['Property Type'] || '其它';
      counts[v] = (counts[v] || 0) + 1;
    });

    const top = ['全部'];
    TOP_PROPERTY_TYPES.forEach(t => { if (counts[t]) top.push(t); });
    // add remaining sorted
    const rest = Object.entries(counts)
      .filter(([k]) => !TOP_PROPERTY_TYPES.includes(k))
      .sort((a,b) => b[1]-a[1])
      .map(([k]) => k);
    top.push(...rest.slice(0, 10)); // max ~20 total chips

    top.forEach(t => {
      const c = document.createElement('span');
      c.className = 'chip' + (t === '全部' ? ' active' : '');
      const cnt = t === '全部' ? ALL.length : (counts[t]||0);
      c.textContent = t + ' ' + cnt;
      c.onclick = () => {
        pt.querySelectorAll('.chip').forEach(ch => ch.classList.remove('active'));
        c.classList.add('active');
        activePropertyType = t === '全部' ? null : t;
        render();
      };
      pt.appendChild(c);
    });
  }

  // ── Render ──
  function render() {
    const q = (document.getElementById('search').value || '').toLowerCase();
    let filtered = ALL;

    if (activeListingType) {
      filtered = filtered.filter(l => l['Listing Type'] === activeListingType);
    }
    if (activePropertyType) {
      filtered = filtered.filter(l => (l['Property Type'] || '其它') === activePropertyType);
    }
    if (q) {
      filtered = filtered.filter(l => {
        return ['Agent Name','Property Name','Remark','Post Text'].some(k =>
          (l[k] || '').toLowerCase().includes(q)
        );
      });
    }

    document.getElementById('showing').textContent = `显示 ${filtered.length} 条`;
    document.getElementById('empty-msg').style.display = filtered.length === 0 ? 'block' : 'none';

    const container = document.getElementById('card-container');
    container.innerHTML = filtered.map(l => cardHTML(l)).join('');
  }

  function cardHTML(l) {
    const name = l['Property Name'] || l['Agent Name'] || '未命名';
    const agent = l['Agent Name'] || '';
    const listingType = l['Listing Type'] || '';
    const propertyType = l['Property Type'] || '';
    const rooms = l['Rooms'] || '';
    const furnishing = l['Furnishing'] || '';
    const rent = l['Rent (RM)'] || '';
    const phone = l['Phone'] || '';
    const link = l['Link'] || '';
    const remark = l['Remark'] || '';
    const scraped = l['Scraped At'] || '';
    const postText = l['Post Text'] || '';

    const badgeClass = listingType === '出售' ? 'badge-sale' : 'badge-rent';
    const badgeText = listingType || '';

    // meta chips
    let meta = '';
    if (propertyType) meta += `<span class="meta-chip">${esc(propertyType)}</span>`;
    if (rooms) meta += `<span class="meta-chip">${esc(rooms)}</span>`;
    if (furnishing) meta += `<span class="meta-chip">${esc(furnishing)}</span>`;
    if (rent) meta += `<span class="meta-chip meta-rent">RM ${esc(rent)}</span>`;
    if (remark) meta += `<span class="meta-chip">${esc(remark.slice(0,30))}${remark.length>30?'…':''}</span>`;

    // phone
    let phoneHTML = '';
    if (phone) {
      phoneHTML = `<a class="card-phone" href="tel:${esc(phone)}">📞 ${esc(phone)}</a>`;
    }

    // post text
    let postHTML = '';
    if (postText) {
      const maxLen = 100;
      const truncated = postText.length > maxLen;
      const display = truncated ? postText.slice(0, maxLen) + '…' : postText;
      postHTML = `<div class="card-post" onclick="this.classList.toggle('expanded');this.querySelector('.full').style.display=this.classList.contains('expanded')?'inline':'none';this.querySelector('.short').style.display=this.classList.contains('expanded')?'none':'inline';">
        <span class="short">${esc(display)}</span>
        <span class="full" style="display:none">${esc(postText)}</span>
        ${truncated ? '<span class="post-toggle">展开▼</span>' : ''}
      </div>`;
    }

    // footer
    const date = scraped ? scraped.slice(0,10) : '';

    return `
      <div class="card">
        <div class="card-top">
          <div class="card-title">${esc(name)}</div>
          ${badgeText ? `<div class="card-badge ${badgeClass}">${esc(badgeText)}</div>` : ''}
        </div>
        ${meta ? `<div class="card-meta">${meta}</div>` : ''}
        ${phoneHTML}
        ${postHTML}
        <div class="card-footer">
          <span>${agent ? esc(agent) + ' · ' : ''}${date}</span>
          ${link ? `<a class="card-link" href="${esc(link)}" target="_blank" onclick="event.stopPropagation()">FB 原帖 →</a>` : ''}
        </div>
      </div>`;
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }
</script>
</body>
</html>
