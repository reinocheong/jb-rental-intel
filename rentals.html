<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>JB Rentals — 房源速览</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: #020617;
      min-height: 100vh;
      color: white;
    }

    /* Header */
    .header {
      background: #020617;
      padding: 0.85rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.3rem; }
    .pulse-dot { width: 8px; height: 8px; flex-shrink: 0; background: #34d399; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .header h1 { font-size: 1rem; font-weight: 700; }
    .header .stats { color: #94a3b8; font-size: 0.68rem; margin-top: 0.15rem; }

    /* Sticky bar */
    .sticky-bar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #020617;
      padding: 0 0.85rem 0.5rem;
    }
    .search-box {
      width: 100%;
      padding: 0.5rem 0.6rem;
      border-radius: 0.5rem;
      border: 1px solid #1e293b;
      background: rgba(15,23,42,0.7);
      color: white;
      font-size: 0.8rem;
      outline: none;
      margin-bottom: 0.4rem;
    }
    .search-box::placeholder { color: #475569; }
    .search-box:focus { border-color: #34d399; }

    .tag-row {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      gap: 0.35rem;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 0.2rem;
    }
    .tag {
      flex-shrink: 0;
      padding: 0.25rem 0.55rem;
      border-radius: 0.35rem;
      font-size: 0.68rem;
      cursor: pointer;
      border: 1px solid #1e293b;
      background: rgba(30,41,59,0.5);
      color: #94a3b8;
      white-space: nowrap;
    }
    .tag.active {
      background: rgba(52, 211, 153, 0.12);
      border-color: #34d399;
      color: #34d399;
    }

    /* Cards */
    .listings {
      padding: 0 0.85rem 1rem;
    }
    .card {
      background: rgba(15,23,42,0.5);
      border-radius: 0.6rem;
      border: 1px solid #1e293b;
      padding: 0.7rem;
      margin-bottom: 0.5rem;
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.35rem;
    }
    .card-prop {
      font-size: 0.88rem;
      font-weight: 600;
      color: #e2e8f0;
      line-height: 1.3;
    }
    .card-rent {
      font-size: 0.9rem;
      font-weight: 700;
      color: #fbbf24;
      flex-shrink: 0;
      margin-left: 0.5rem;
    }

    .card-details {
      font-size: 0.72rem;
      color: #94a3b8;
      line-height: 1.6;
    }
    .card-details .field {
      display: inline;
      margin-right: 0.5rem;
    }
    .card-details .field:empty { display: none; }

    .card-agent {
      font-size: 0.72rem;
      color: #cbd5e1;
      margin-top: 0.3rem;
    }

    .card-post {
      margin-top: 0.4rem;
      padding: 0.4rem 0.5rem;
      border-radius: 0.35rem;
      background: rgba(30,41,59,0.4);
      border-left: 2px solid #1e293b;
      font-size: 0.7rem;
      color: #94a3b8;
      line-height: 1.5;
      cursor: pointer;
      white-space: pre-line;
      word-break: break-word;
    }
    .card-post.collapsed {
      max-height: 4.5em;
      overflow: hidden;
      position: relative;
    }
    .card-post.collapsed::after {
      content: "展开全文 ↓";
      position: absolute;
      bottom: 0;
      right: 0;
      background: linear-gradient(to left, rgba(15,23,42,0.95) 60%, transparent);
      padding: 0.1rem 0.5rem 0.1rem 2rem;
      color: #34d399;
      font-size: 0.65rem;
    }
    .card-post.expanded::after {
      content: "收起 ↑";
      display: block;
      text-align: center;
      color: #34d399;
      font-size: 0.65rem;
      margin-top: 0.3rem;
    }
    .card-post.short::after { content: none; }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.45rem;
      font-size: 0.65rem;
    }
    .card-time { color: #475569; }
    .card-link { color: #22d3ee; text-decoration: none; }
    .card-link:hover { text-decoration: underline; }

    /* Empty */
    .empty {
      text-align: center;
      padding: 2rem;
      color: #475569;
      font-size: 0.8rem;
    }

    .footer {
      text-align: center;
      padding: 0.75rem;
      color: #334155;
      font-size: 0.65rem;
    }
  </style>
</head>
<body>

<div class="sticky-bar">
  <div class="header" style="padding:0.5rem 0 0.3rem;">
    <div class="header-row">
      <div class="pulse-dot"></div>
      <h1>JB Rentals 房源速览</h1>
    </div>
    <div class="stats" id="stats">加载中…</div>
  </div>
  <input class="search-box" type="text" placeholder="🔍 搜楼盘 / Agent / 房型 / 备注" oninput="filter()" id="search">

  <div class="tag-row" id="tagRow">
    <span class="tag active" onclick="selectTag('')">全部</span>
  </div>
</div>

<div class="listings" id="listings"></div>
<div class="empty" id="empty" style="display:none">没有匹配的房源</div>

<p class="footer">Smart Tenancy Pro · 数据每 30 分钟更新</p>

<script>
let DATA = { total: 0, today_new: 0, listings: [], top_properties: [] };
let activeTag = '';
let searchText = '';

async function load() {
  try {
    const r = await fetch('data/rentals.json?' + Date.now());
    DATA = await r.json();
    renderStats();
    renderTags();
    filter();
  } catch(e) {
    document.getElementById('stats').textContent = '⚠️ 数据加载失败';
    document.getElementById('listings').innerHTML = '<div class="empty">无法加载房源数据</div>';
  }
}

function renderStats() {
  const t = new Date(DATA.updated_at);
  const now = new Date();
  const min = Math.floor((now - t) / 60000);
  let ago = min < 1 ? '刚刚' : min < 60 ? min + ' 分钟前' : Math.floor(min/60) + ' 小时前';
  document.getElementById('stats').textContent =
    `共 ${DATA.total} 套房源 · 今日新增 ${DATA.today_new} 套 · 更新于 ${ago}`;
}

function renderTags() {
  const row = document.getElementById('tagRow');
  row.innerHTML = '<span class="tag active" onclick="selectTag(\'\')">全部</span>';
  DATA.top_properties.slice(0, 8).forEach(p => {
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = p;
    span.onclick = () => selectTag(p);
    row.appendChild(span);
  });
}

function selectTag(tag) {
  activeTag = activeTag === tag ? '' : tag;
  document.querySelectorAll('.tag').forEach(t => {
    t.classList.toggle('active', t.textContent === (activeTag || '全部'));
  });
  filter();
}

function filter() {
  searchText = document.getElementById('search').value.toLowerCase().trim();
  renderListings();
}

function timeAgo(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const min = Math.floor((now - d) / 60000);
  if (min < 1) return '刚刚';
  if (min < 60) return min + ' 分钟前';
  if (min < 1440) return Math.floor(min/60) + ' 小时前';
  return Math.floor(min/1440) + ' 天前';
}

function fmtRent(r) {
  if (!r) return '';
  // try to format as RM
  const n = parseInt(String(r).replace(/,/g,''));
  if (isNaN(n)) return r;
  if (n >= 1000) return 'RM ' + (n/1000).toFixed(1).replace(/\.0$/,'') + 'k';
  return 'RM ' + n;
}

function renderListings() {
  let items = DATA.listings;
  if (activeTag) {
    items = items.filter(l => (l.property || '').includes(activeTag));
  }
  if (searchText) {
    items = items.filter(l => {
      const blob = [l.property, l.agent, l.property_type, l.remark, l.type, l.furnishing].join('|').toLowerCase();
      return blob.includes(searchText);
    });
  }

  const html = items.map(l => {
    const postLen = (l.post_text || '').length;
    const shortPost = postLen <= 80;

    // build details line — only show non-empty fields
    let detailParts = [];
    if (l.type) detailParts.push(l.type);
    if (l.property_type) detailParts.push(l.property_type);
    if (l.rooms) detailParts.push(l.rooms);
    if (l.furnishing) detailParts.push(l.furnishing);
    if (l.remark) detailParts.push(l.remark);
    const detailLine = detailParts.join(' · ');

    // agent + phone
    let agentLine = [];
    if (l.agent) agentLine.push('Agent: ' + l.agent);
    if (l.phone) agentLine.push('📱 ' + l.phone);
    const agentStr = agentLine.join('  ');

    // post text
    let postHtml = '';
    if (l.post_text) {
      let cls = shortPost ? 'card-post short' : 'card-post collapsed';
      let onclick = shortPost ? '' : ' onclick="togglePost(this)"';
      postHtml = `<div class="${cls}"${onclick}>${esc(l.post_text)}</div>`;
    }

    const rent = l.rent ? fmtRent(l.rent) : '';

    return `
      <div class="card">
        <div class="card-top">
          <span class="card-prop">${esc(l.property || '(未识别)')}</span>
          ${rent ? '<span class="card-rent">' + esc(rent) + '</span>' : ''}
        </div>
        ${detailLine ? '<div class="card-details">' + esc(detailLine) + '</div>' : ''}
        ${agentStr ? '<div class="card-agent">' + esc(agentStr) + '</div>' : ''}
        ${postHtml}
        <div class="card-footer">
          <span class="card-time">${timeAgo(l.scraped_at)}</span>
          ${l.link ? '<a class="card-link" href="' + esc(l.link) + '" target="_blank">FB 原帖 →</a>' : ''}
        </div>
      </div>`;
  }).join('');

  document.getElementById('listings').innerHTML = html || '<div class="empty">没有匹配的房源</div>';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = (s || '');
  return d.innerHTML;
}

function togglePost(el) {
  if (el.classList.contains('collapsed')) {
    el.classList.remove('collapsed');
    el.classList.add('expanded');
  } else {
    el.classList.remove('expanded');
    el.classList.add('collapsed');
  }
}

load();
</script>
</body>
</html>
