<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JB Rentals — Cobroke 房源浏览</title>
<style>
  :root {
    --bg: #0d1117;
    --card-bg: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
    --accent-dim: #1f6feb33;
    --tag-bg: #1a2332;
    --tag-active: #1f6feb;
    --rent: #3fb950;
    --phone: #d2a8ff;
    --link: #58a6ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { 
    background: var(--bg); 
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    overflow-x: hidden;
    width: 100%;
  }

  /* 容器 — 手机宽度自适应 */
  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 12px 12px 40px;
    width: 100%;
  }

  /* 头部 */
  .header {
    text-align: center;
    padding: 24px 0 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--accent);
  }
  .header .sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* 搜索栏 */
  .search-bar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    padding: 8px 0 4px;
  }
  .search-bar input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card-bg);
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus {
    border-color: var(--accent);
  }
  .search-bar input::placeholder {
    color: var(--muted);
  }

  /* 标签过滤 */
  .tag-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px 0 12px;
  }
  .tag {
    padding: 4px 10px;
    border-radius: 14px;
    font-size: 12px;
    background: var(--tag-bg);
    color: var(--muted);
    border: 1px solid var(--border);
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
    transition: all 0.15s;
  }
  .tag.active {
    background: var(--tag-active);
    color: #fff;
    border-color: var(--tag-active);
  }
  .tag .count {
    opacity: 0.6;
    font-size: 11px;
  }

  /* 统计条 */
  .stats {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    font-size: 13px;
    color: var(--muted);
  }

  /* 卡片网格 */
  .card-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }
  @media (min-width: 600px) {
    .card-grid { grid-template-columns: 1fr 1fr; }
  }
  @media (min-width: 900px) {
    .card-grid { grid-template-columns: 1fr 1fr 1fr; }
  }

  /* 卡片 */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: var(--accent); }
  .card.hidden { display: none; }

  .card .agent {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .card .property {
    font-size: 14px;
    color: var(--accent);
    margin-bottom: 8px;
    word-break: break-word;
  }
  .card .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    margin-bottom: 4px;
  }
  .card .row .label { color: var(--muted); }
  .card .rent { color: var(--rent); font-weight: 600; font-size: 14px; }
  .card .phone { color: var(--phone); font-size: 13px; }
  .card .listing-type {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 10px;
    font-size: 11px;
    background: var(--accent-dim);
    color: var(--accent);
  }
  .card .remark {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--border);
    word-break: break-word;
  }
  .card .link-row {
    margin-top: 8px;
    font-size: 12px;
  }
  .card .link-row a {
    color: var(--link);
    text-decoration: none;
  }
  .card .link-row a:hover { text-decoration: underline; }

  /* 加载更多 */
  .load-more {
    text-align: center;
    padding: 20px;
  }
  .load-more button {
    padding: 10px 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--accent);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .load-more button:hover {
    background: var(--accent-dim);
    border-color: var(--accent);
  }
  .load-more button:disabled {
    opacity: 0.4;
    cursor: default;
  }

  /* 加载状态 */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 15px;
  }
  .spinner {
    display: inline-block;
    width: 24px;
    height: 24px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 空状态 */
  .empty {
    text-align: center;
    padding: 32px;
    color: var(--muted);
    font-size: 15px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🏠 JB Rentals</h1>
    <div class="sub">Cobroke 房源快速浏览 · 数据每日更新</div>
  </div>

  <div class="search-bar">
    <input type="text" id="search" placeholder="搜索楼盘名、agent 名、房型…" autofocus>
  </div>
  <div class="tag-cloud" id="tags"></div>
  <div class="stats">
    <span id="stats-count">加载中…</span>
    <span id="stats-updated"></span>
  </div>

  <div class="card-grid" id="cards"></div>

  <div class="load-more" id="load-more" style="display:none">
    <button id="load-btn">加载更多</button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>加载房源数据…</div>
  </div>
</div>

<script>
// —— 全局状态 ——
let allListings = [];
let filtered = [];
let shown = 0;
const PAGE = 30;

// —— 工具 ——
function $(id) { return document.getElementById(id); }

// —— 渲染标签云 ——
function buildTags(listings) {
  const count = {};
  listings.forEach(l => {
    const pn = (l['Property Name'] || '').trim();
    if (pn && pn.length > 2) count[pn] = (count[pn] || 0) + 1;
  });
  // 取 top 25，按数量降序
  const sorted = Object.entries(count)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 25);

  const tagsEl = $('tags');
  tagsEl.innerHTML = sorted.map(([name, n]) =>
    `<span class="tag" data-building="${escHtml(name)}">${escHtml(name)} <span class="count">${n}</span></span>`
  ).join('');

  // 点击事件
  tagsEl.querySelectorAll('.tag').forEach(tag => {
    tag.addEventListener('click', () => {
      const building = tag.dataset.building;
      if (tag.classList.contains('active')) {
        // 取消选中 → 显示全部
        tag.classList.remove('active');
        applyFilters('');
      } else {
        // 选中
        tagsEl.querySelectorAll('.tag.active').forEach(t => t.classList.remove('active'));
        tag.classList.add('active');
        applyFilters(building);
      }
    });
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// —— 过滤 ——
function applyFilters(building) {
  const search = $('search').value.toLowerCase().trim();
  filtered = allListings.filter(l => {
    // 楼盘标签过滤
    if (building && (l['Property Name'] || '').trim() !== building) return false;
    // 搜索词过滤
    if (search) {
      const haystack = [
        l['Agent Name'], l['Property Name'], l['Property Type'],
        l['Listing Type'], l['Rooms'], l['Remark'], l['Phone']
      ].join(' ').toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });
  shown = 0;
  $('cards').innerHTML = '';
  renderMore();
  updateStats();
}

function updateStats() {
  $('stats-count').textContent = `显示 ${Math.min(shown, filtered.length)} / ${filtered.length} 条`;
}

// —— 渲染卡片 ——
function renderMore() {
  const slice = filtered.slice(shown, shown + PAGE);
  if (slice.length === 0) {
    $('load-more').style.display = 'none';
    if (shown === 0) {
      $('cards').innerHTML = '<div class="empty">没有匹配的房源</div>';
    }
    return;
  }

  const html = slice.map(l => {
    const rent = l['Rent (RM)'] ? `RM ${l['Rent (RM)']}` : '';
    const phone = l['Phone'] ? l['Phone'] : '';
    const listingType = l['Listing Type'] || '';
    const remark = l['Remark'] || '';
    const link = l['Link'] || '';
    const rooms = l['Rooms'] || '';
    const furnishing = l['Furnishing'] || '';
    const scraped = (l['Scraped At'] || '').slice(0, 10);

    return `
      <div class="card">
        <div class="agent">${escHtml(l['Agent Name'] || '—')}</div>
        <div class="property">${escHtml(l['Property Name'] || l['Property Type'] || '—')}</div>
        <div class="row">
          <span class="label">${rent ? `<span class="rent">${escHtml(rent)}</span>` : ''}
          ${rooms ? ` · ${escHtml(rooms)}` : ''}
          ${furnishing ? ` · ${escHtml(furnishing)}` : ''}</span>
          ${listingType ? `<span class="listing-type">${escHtml(listingType)}</span>` : ''}
        </div>
        <div class="row" style="margin-top:2px">
          ${phone ? `<span class="phone">📞 ${escHtml(phone)}</span>` : ''}
          <span style="color:var(--muted);font-size:11px">${scraped}</span>
        </div>
        ${remark ? `<div class="remark">${escHtml(remark)}</div>` : ''}
        ${link ? `<div class="link-row"><a href="${escHtml(link)}" target="_blank" rel="noopener">📋 查看 FB 原帖 →</a></div>` : ''}
      </div>`;
  }).join('');

  $('cards').insertAdjacentHTML('beforeend', html);
  shown += slice.length;

  // 更新加载更多按钮
  if (shown < filtered.length) {
    $('load-more').style.display = 'block';
    $('load-btn').disabled = false;
  } else {
    $('load-more').style.display = 'none';
  }
  updateStats();
}

// —— 初始化 ——
async function init() {
  try {
    const resp = await fetch('data/rentals.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    allListings = data.listings;
    filtered = allListings;

    // 更新时间
    $('stats-updated').textContent = `数据更新时间: ${data.updated || '—'}`;

    // 构建标签
    buildTags(allListings);

    // 首屏渲染
    renderMore();

    // 隐藏加载动画
    $('loading').style.display = 'none';

  } catch (err) {
    $('loading').innerHTML = `<div class="empty">⚠️ 加载失败: ${escHtml(err.message)}</div>`;
  }
}

// —— 事件绑定 ——
let searchTimer;
$('search').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    const activeTag = document.querySelector('.tag.active');
    applyFilters(activeTag ? activeTag.dataset.building : '');
  }, 200);
});

$('load-btn').addEventListener('click', () => {
  $('load-btn').disabled = true;
  renderMore();
});

// 启动
init();
</script>
</body>
</html>
